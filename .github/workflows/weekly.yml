name: Weekly RoundSignal issue

# Runs every Monday 06:00 UTC, and on-demand from the Actions tab.
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write   # let the built-in GITHUB_TOKEN commit the refreshed feed

# Never let a manual run and the cron run clobber each other.
concurrency:
  group: weekly-feed
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements-ci.txt
      - name: Build this week's issue + RSS feed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_BASE_URL: https://getroundsignal.com
        run: python weekly_feed.py
      - name: Commit refreshed feed + sample
        run: |
          git config user.name "roundsignal-bot"
          git config user.email "roundsignal-bot@users.noreply.github.com"
          git add feed-*.xml sample.html sample.csv sitemap.xml issue-*.html archive.html
          git commit -m "Weekly issue refresh [skip ci]" || { echo "no changes to commit"; exit 0; }
          git pull --rebase --autostash origin main
          git push
      # Push the refreshed URLs to Bing/Yandex/Seznam/Naver instantly.
      # No account needed: auth is the key file served at the domain root.
      # Never fail the run because of this - it is a best-effort ping.
      - name: Ping IndexNow
        if: always()
        continue-on-error: true
        run: |
          KEY=e0b080639a674923aac3a4568ed9337f
          curl -sS -m 30 -o /dev/null -w "IndexNow HTTP %{http_code}\n" \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"host\":\"getroundsignal.com\",\"key\":\"$KEY\",\"keyLocation\":\"https://getroundsignal.com/$KEY.txt\",\"urlList\":[\"https://getroundsignal.com/\",\"https://getroundsignal.com/sample.html\",\"https://getroundsignal.com/archive.html\"]}" || true
