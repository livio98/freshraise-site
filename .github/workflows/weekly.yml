name: Weekly FreshRaise issue

# Runs every Monday 06:00 UTC, and on-demand from the Actions tab.
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write   # let the built-in GITHUB_TOKEN commit the refreshed feed

# Never let a manual run and the cron run clobber each other.
concurrency:
  group: weekly-feed
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements-ci.txt
      - name: Build this week's issue + RSS feed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_BASE_URL: https://getfreshraise.com
        run: python weekly_feed.py
      - name: Commit refreshed feed + sample
        run: |
          git config user.name "freshraise-bot"
          git config user.email "freshraise-bot@users.noreply.github.com"
          git add feed.xml sample.html sample.csv
          git commit -m "Weekly issue refresh [skip ci]" || { echo "no changes to commit"; exit 0; }
          git pull --rebase --autostash origin main
          git push
